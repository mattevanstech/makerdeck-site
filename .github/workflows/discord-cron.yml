name: Discord Show and Tell Notifier

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Discord notification cron
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://makerdeck-site.vercel.app/api/discord-cron)
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Cron endpoint returned non-200 status"
            exit 1
          fi
