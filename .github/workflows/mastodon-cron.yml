name: Mastodon Cron

on:
  schedule:
    # Runs every 15 minutes — checks for submissions approved for Mastodon
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  post-to-mastodon:
    runs-on: ubuntu-latest
    steps:
      - name: Call mastodon-cron endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://makerdeck.net/api/mastodon-cron")
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Request failed with status $HTTP_STATUS"
            exit 1
          fi
